# ── Test profile (H2 in-memory) ──────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Liquibase for tests
spring.liquibase.enabled=false

# JWT
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtMjU2Yml0cw==
app.jwt.expiration-ms=86400000

# Mail (test — no real send)
spring.mail.host=localhost
spring.mail.port=25
app.mail.from-address=test@virtbank.com
app.mail.from-name=VIRTBANK-TEST
