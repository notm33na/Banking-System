# ==============================================================================
# VIRTBANK — Application Configuration
# ==============================================================================

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── DataSource (MySQL 8) ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/virtbank?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Liquibase (DB Migrations) ────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# ── JavaMail (Mailtrap SMTP) ─────────────────────────────────────────────────
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=YOUR_MAILTRAP_USERNAME
spring.mail.password=YOUR_MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Swagger / SpringDoc OpenAPI ───────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── JWT Configuration ────────────────────────────────────────────────────────
app.jwt.secret=dmlydGJhbmstand0LXNlY3JldC1rZXktZm9yLWRldi1lbnZpcm9ubWVudC0yNTYtYml0cw==
app.jwt.expiration-ms=86400000

# ── Application Info ─────────────────────────────────────────────────────────
spring.application.name=VirtBank
